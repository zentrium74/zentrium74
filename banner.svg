<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff41;stop-opacity:1">
        <animate attributeName="stop-color" values="#00ff41;#00bfff;#9d4edd;#00ff41" dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#9d4edd;stop-opacity:1">
        <animate attributeName="stop-color" values="#9d4edd;#00ff41;#00bfff;#9d4edd" dur="9s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="280" fill="#0a0a0f"/>
  
  <!-- Animated grid background -->
  <g opacity="0.1">
    <line x1="0" y1="70" x2="900" y2="70" stroke="url(#grad1)" stroke-width="1"/>
    <line x1="0" y1="140" x2="900" y2="140" stroke="url(#grad1)" stroke-width="1"/>
    <line x1="0" y1="210" x2="900" y2="210" stroke="url(#grad1)" stroke-width="1"/>
  </g>
  
  <!-- Main title -->
  <text x="450" y="110" font-family="'Orbitron', monospace" font-size="72" font-weight="900" fill="url(#grad1)" text-anchor="middle" filter="url(#glow)">
    ZENTRIUM 74
  </text>
  
  <!-- Animated underline -->
  <line x1="200" y1="130" x2="700" y2="130" stroke="url(#grad1)" stroke-width="3">
    <animate attributeName="x1" values="200;250;200" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="700;650;700" dur="3s" repeatCount="indefinite"/>
  </line>
  
  <!-- Subtitle -->
  <text x="450" y="170" font-family="'Orbitron', monospace" font-size="24" fill="#00ff41" text-anchor="middle" opacity="0.9">
    AI ENGINEER | DATA SCIENTIST | BUILDER
  </text>
  
  <!-- Animated particles -->
  <circle cx="100" cy="50" r="2" fill="#00ff41" opacity="0.6">
    <animate attributeName="cy" values="50;230;50" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="200" r="2" fill="#00bfff" opacity="0.6">
    <animate attributeName="cy" values="200;50;200" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="100" r="2" fill="#9d4edd" opacity="0.6">
    <animate attributeName="cy" values="100;250;100" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="800" cy="180" r="2" fill="#00ff41" opacity="0.6">
    <animate attributeName="cy" values="180;30;180" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="9s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Bottom accent line -->
  <rect x="0" y="275" width="900" height="5" fill="url(#grad1)">
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </rect>
</svg>
